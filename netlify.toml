[build]
  command = "npm run build"
  publish = "dist"

# Redireciona chamadas da API do frontend para as Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Fallback para o React Router (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
